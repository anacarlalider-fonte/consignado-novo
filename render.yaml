# Blueprint opcional: https://render.com/docs/blueprint-spec
# Ajuste nomes/região. Após o primeiro deploy, rode no shell do serviço web:
#   npx prisma db seed
# (cria usuário admin@kato.com — veja DEPLOY.md)

databases:
  - name: crm-consignado-db
    databaseName: crm_kato
    user: crm

services:
  - type: web
    name: crm-consignado-api
    runtime: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crm-consignado-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false

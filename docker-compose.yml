services:
  postgres:
    image: postgres:16
    container_name: crm_kato_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_kato
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crm_kato_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
